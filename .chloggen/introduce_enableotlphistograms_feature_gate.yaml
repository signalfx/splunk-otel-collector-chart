subtext: |
  When enabled all histograms going through the agent, cluster receiver, and gateway will be sent as
  OTLP histograms to Splunk Observability Cloud. This feature gate is enabled by default. This feature
  gate will be used to take the place of the deprecated `useControlPlaneMetricsHistogramData` feature gate.
