change_type: bug_fix
# The name of the component, or a single word describing the area of concern, (e.g. agent, clusterReceiver, gateway, operator, chart, other)
component: agent
# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Fix histogram bucket count for `kubeproxy_network_programming_duration_seconds` metric
# One or more tracking issues related to the change
issues: [2328]
# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Splunk Observability Cloud has a limit of 32 buckets for histograms. By default this histogram
  has more than 32 buckets, so the config will now automatically merge buckets to meet the required limit
  to avoid this metric being dropped. This change is relevant when both the `useControlPlaneMetricsHistogramData`
  feature gate and `agent.controlPlaneMetrics.proxy` are both enabled.
