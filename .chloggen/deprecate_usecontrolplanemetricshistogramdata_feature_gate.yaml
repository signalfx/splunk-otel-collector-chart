# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: deprecation
# The name of the component, or a single word describing the area of concern, (e.g. agent, clusterReceiver, gateway, operator, chart, other)
component: agent
# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: The feature gate `useControlPlaneMetricsHistogramData` is deprecated and will be removed in a future release.
# One or more tracking issues related to the change
issues: [2308]
# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Please use the newly introduced `enableSplunkO11yOTLPHistograms` feature gate instead.
  The value of `useControlPlaneMetricsHistogramData` will only change the chart's configuration when it's enabled,
  `enableSplunkO11yOTLPHistograms` is disabled, and the gateway is disabled. In this case, control plane metrics
  will be sent as histograms to Splunk Observability Cloud. Otherwise, the behavior of `enableSplunkO11yOTLPHistograms`
  will take precedent.
