# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: bug_fix
# The name of the component, or a single word describing the area of concern, (e.g. agent, clusterReceiver, gateway, operator, chart, other)
component: agent
# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Prometheus scrapers for `autodetect.prometheus` and `autodetect.istio` are now in proper pipeline
# One or more tracking issues related to the change
issues: [2308]
# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Due to a bug in rendering when `useControlPlaneMetricsHistogramData` was enabled, the autodetect
  related scrapers were in the `metrics/histogram` pipeline, rather than the `metrics`
  pipeline. This means these metrics weren't properly going through the gateway, and were not being
  sent to Splunk Platform (when these options were enabled.) These metrics were also not going
  through a processor intended for Istio metrics that drops unnecessary dimensions to avoid
  the limit.
