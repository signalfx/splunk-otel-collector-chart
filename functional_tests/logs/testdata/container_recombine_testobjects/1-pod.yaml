apiVersion: v1
kind: Pod
metadata:
  name: container-recombine-writer
  namespace: container-recombine-test
  labels:
    app: container-recombine-writer
spec:
  # The init container runs as privileged so it can write into /var/log/pods on
  # the host. It creates raw log files in cri-o, containerd, and docker formats,
  # each containing partial (P/no-newline) and final (F/newline) entries that the
  # filelog receiver's recombine operators must stitch back into single log records.
  initContainers:
    - name: log-writer
      image: busybox:latest
      securityContext:
        privileged: true
      volumeMounts:
        - name: varlogpods
          mountPath: /var/log/pods
      command:
        - sh
        - -c
        - |
          # CRI-O format: timestamp has no Z suffix on the timezone offset.
          # Matched by parser-crio (regex: '^(?P<time>[^ Z]+) ...').
          CRIO_DIR=/var/log/pods/container-recombine-test_container-recombine-writer_fake-uid/crio-container
          mkdir -p "$CRIO_DIR"
          printf '2026-01-01T00:00:00.000000000+00:00 stdout F CRIO_SINGLE_LINE_MARKER\n'   >> "$CRIO_DIR/0.log"
          printf '2026-01-01T00:00:01.000000000+00:00 stdout P CRIO_PARTIAL_START '         >> "$CRIO_DIR/0.log"
          printf '2026-01-01T00:00:01.000000001+00:00 stdout P middle_chunk '               >> "$CRIO_DIR/0.log"
          printf '2026-01-01T00:00:01.000000002+00:00 stdout F CRIO_PARTIAL_END\n'          >> "$CRIO_DIR/0.log"

          # Containerd format: timestamp ends with Z.
          # Matched by parser-containerd (regex: '^(?P<time>[^ ]+) ...').
          CTR_DIR=/var/log/pods/container-recombine-test_container-recombine-writer_fake-uid/containerd-container
          mkdir -p "$CTR_DIR"
          printf '2026-01-01T00:00:02.000000000Z stdout F CONTAINERD_SINGLE_LINE_MARKER\n' >> "$CTR_DIR/0.log"
          printf '2026-01-01T00:00:03.000000000Z stdout P CONTAINERD_PARTIAL_START '       >> "$CTR_DIR/0.log"
          printf '2026-01-01T00:00:03.000000001Z stdout P middle_chunk '                   >> "$CTR_DIR/0.log"
          printf '2026-01-01T00:00:03.000000002Z stdout F CONTAINERD_PARTIAL_END\n'        >> "$CTR_DIR/0.log"

          # Docker format: each entry is a JSON object with "log", "stream", and "time" fields.
          # Partial entries have a "log" value without a trailing newline; the final entry ends with \n.
          # Matched by parser-docker (body starts with '{').
          DOCKER_DIR=/var/log/pods/container-recombine-test_container-recombine-writer_fake-uid/docker-container
          mkdir -p "$DOCKER_DIR"
          printf '{"log":"DOCKER_SINGLE_LINE_MARKER\\n","stream":"stdout","time":"2026-01-01T00:00:04.000000000Z"}\n' >> "$DOCKER_DIR/0.log"
          printf '{"log":"DOCKER_PARTIAL_START ","stream":"stdout","time":"2026-01-01T00:00:05.000000000Z"}\n'        >> "$DOCKER_DIR/0.log"
          printf '{"log":"middle_chunk ","stream":"stdout","time":"2026-01-01T00:00:05.000000001Z"}\n'                >> "$DOCKER_DIR/0.log"
          printf '{"log":"DOCKER_PARTIAL_END\\n","stream":"stdout","time":"2026-01-01T00:00:05.000000002Z"}\n'        >> "$DOCKER_DIR/0.log"

          echo "log-writer: done"
  containers:
    - name: sleep
      image: busybox:latest
      command: ["sh", "-c", "sleep infinity"]
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
        type: Directory
