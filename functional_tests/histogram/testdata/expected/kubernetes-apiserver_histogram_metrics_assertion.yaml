resources:
    - attributes:
        host.name: kind-control-plane
        k8s.cluster.name: sock
        k8s.namespace.name: kube-system
        k8s.node.name: kind-control-plane
        k8s.pod.name: kube-apiserver-kind-control-plane
        k8s.pod.uid/regex: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
        os.type: linux
        server.address/regex: .+
        server.port/regex: '[0-9]+'
        service.instance.id/regex: .+
        service.name: kubernetes-apiserver
        url.scheme: https
      scopes:
        - metrics:
            - datapoints:
                - explicit_bounds:
                    - 0.005
                    - 0.025
                    - 0.05
                    - 0.1
                    - 0.2
                    - 0.4
                    - 0.6
                    - 0.8
                    - 1
                    - 1.25
                    - 1.5
                    - 2
                    - 3
                    - 4
                    - 5
                    - 6
                    - 8
                    - 10
                    - 15
                    - 20
                    - 30
                    - 45
                    - 60
              name: apiserver_request_duration_seconds
              temporality: cumulative
              type: histogram
            - datapoints:
                - explicit_bounds:
                    - 1000
                    - 10000
                    - 100000
                    - 1e+06
                    - 1e+07
                    - 1e+08
                    - 1e+09
              name: apiserver_response_sizes
              temporality: cumulative
              type: histogram
            - datapoints:
                - explicit_bounds:
                    - 0.005
                    - 0.025
                    - 0.1
                    - 0.25
                    - 0.5
                    - 1
                    - 2
                    - 4
                    - 8
                    - 15
                    - 30
                    - 60
              name: rest_client_request_duration_seconds
              temporality: cumulative
              type: histogram
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
signal: metrics
version: 1
