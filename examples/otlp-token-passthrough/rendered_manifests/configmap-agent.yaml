---
# Source: splunk-otel-collector/templates/configmap-agent.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: default-splunk-otel-collector-otel-agent
  namespace: default
  labels:
    app.kubernetes.io/name: splunk-otel-collector
    helm.sh/chart: splunk-otel-collector-0.149.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: default
    app.kubernetes.io/version: "0.149.0"
    app: splunk-otel-collector
    chart: splunk-otel-collector-0.149.0
    release: default
data:
  relay: |
    exporters:
      otlp_grpc:
        auth:
          authenticator: headers_setter
        endpoint: default-splunk-otel-collector:4317
        tls:
          insecure: true
      otlp_http/entities:
        auth:
          authenticator: headers_setter
        endpoint: http://default-splunk-otel-collector:4318
      signalfx:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}
        api_url: http://default-splunk-otel-collector:6060
        correlation: null
        ingest_url: http://default-splunk-otel-collector:9943
        root_path: /hostfs
        sync_host_metadata: true
      signalfx/histograms:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}
        api_url: https://api.CHANGEME.signalfx.com
        ingest_url: https://ingest.CHANGEME.signalfx.com
        send_otlp_histograms: true
      signalfx/host_metadata:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}
        api_url: http://default-splunk-otel-collector:6060
        correlation: null
        exclude_metrics:
        - metric_name: '**'
        ingest_url: http://default-splunk-otel-collector:9943
        root_path: /hostfs
        sync_host_metadata: true
    extensions:
      headers_setter:
        headers:
        - action: upsert
          default_value: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}
          from_context: X-SF-TOKEN
          key: X-SF-TOKEN
      health_check:
        endpoint: 0.0.0.0:13133
      k8s_observer:
        auth_type: serviceAccount
        node: ${K8S_NODE_NAME}
      zpages: null
    processors:
      batch:
        metadata_keys:
        - X-SF-Token
      k8s_attributes:
        extract:
          annotations:
          - from: pod
            key: splunk.com/sourcetype
          - from: namespace
            key: splunk.com/exclude
            tag_name: splunk.com/exclude
          - from: pod
            key: splunk.com/exclude
            tag_name: splunk.com/exclude
          - from: namespace
            key: splunk.com/index
            tag_name: com.splunk.index
          - from: pod
            key: splunk.com/index
            tag_name: com.splunk.index
          labels:
          - key: app
          metadata:
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.name
          - k8s.pod.uid
          - container.id
          - container.image.name
          - container.image.tag
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: true
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: ip
        - sources:
          - from: connection
      memory_limiter:
        check_interval: 2s
        limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}
      resource:
        attributes:
        - action: insert
          key: k8s.node.name
          value: ${K8S_NODE_NAME}
        - action: upsert
          key: k8s.cluster.name
          value: CHANGEME
      resource/add_agent_k8s:
        attributes:
        - action: insert
          key: k8s.pod.name
          value: ${K8S_POD_NAME}
        - action: insert
          key: k8s.pod.uid
          value: ${K8S_POD_UID}
        - action: insert
          key: k8s.namespace.name
          value: ${K8S_NAMESPACE}
      resource/add_mode:
        attributes:
        - action: insert
          key: otelcol.service.mode
          value: agent
      resourcedetection:
        detectors:
        - env
        - system
        override: true
        timeout: 15s
      transform/k8s_proxy_histogram:
        metric_statements:
        - merge_histogram_buckets(11.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(12.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(13.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(14.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(16.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(17.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(18.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(19.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(21.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(22.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(23.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(24.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(26.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(27.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(28.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(29.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(31.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(32.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(33.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(34.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(36.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(37.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(38.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(39.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(41.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(42.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(43.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(44.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(45.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(46.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(47.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(48.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(49.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(51.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(52.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(52.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(53.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(54.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(55.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(56.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(57.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(58.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(59.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(65.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(75.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(85.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(95.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(85.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(100.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(110.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(115.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
        - merge_histogram_buckets(270.0) where metric.name == "kubeproxy_network_programming_duration_seconds"
    receivers:
      hostmetrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu: null
          disk: null
          filesystem:
            include_mount_points:
              match_type: strict
              mount_points:
              - /
          load: null
          memory: null
          network: null
          paging: null
          processes: null
      jaeger:
        protocols:
          grpc:
            endpoint: 0.0.0.0:14250
          thrift_http:
            endpoint: 0.0.0.0:14268
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 10s
        endpoint: ${K8S_NODE_IP}:10250
        extra_metadata_labels:
        - container.id
        metric_groups:
        - container
        - pod
        - node
        metrics:
          k8s.node.cpu.usage:
            enabled: false
          k8s.pod.cpu.usage:
            enabled: false
      nop: null
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            include_metadata: true
          http:
            endpoint: 0.0.0.0:4318
            include_metadata: true
      prometheus/agent:
        config:
          scrape_configs:
          - job_name: otel-agent
            metric_relabel_configs:
            - source_labels:
              - service_name
              target_label: service.name
            - source_labels:
              - service_instance_id
              target_label: service.instance.id
            - source_labels:
              - service_version
              target_label: service.version
            - action: labeldrop
              regex: service_name|service_instance_id|service_version
            - action: drop
              regex: promhttp_metric_handler_errors.*
              source_labels:
              - __name__
            - action: drop
              regex: otelcol_processor_batch_.*
              source_labels:
              - __name__
            - action: drop
              regex: .*otelcol\.k8s\.pod\.association
              source_labels:
              - __name__
            scrape_interval: 10s
            static_configs:
            - targets:
              - localhost:8889
      receiver_creator:
        receivers:
          prometheus/coredns:
            config:
              config:
                scrape_configs:
                - job_name: coredns
                  metric_relabel_configs:
                  - action: keep
                    regex: (coredns_dns_request_duration_seconds|coredns_cache_misses_total|coredns_cache_hits_total|coredns_cache_entries|coredns_dns_responses_total|coredns_dns_requests_total|rest_client_requests_total|rest_client_request_duration_seconds)(?:_sum|_count|_bucket)?
                    source_labels:
                    - __name__
                  scrape_interval: 10s
                  static_configs:
                  - targets:
                    - '`endpoint`:9153'
            rule: type == "pod" && labels["k8s-app"] == "kube-dns"
          prometheus/kube-controller-manager:
            config:
              config:
                scrape_configs:
                - authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                    type: Bearer
                  job_name: kube-controller-manager
                  metric_relabel_configs:
                  - action: keep
                    regex: (workqueue_longest_running_processor_seconds|workqueue_unfinished_work_seconds|workqueue_depth|workqueue_retries_total|workqueue_queue_duration_seconds)(?:_sum|_count|_bucket)?
                    source_labels:
                    - __name__
                  scheme: https
                  scrape_interval: 10s
                  static_configs:
                  - targets:
                    - '`endpoint`:10257'
                  tls_config:
                    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecure_skip_verify: true
            rule: type == "pod" && (labels["k8s-app"] == "kube-controller-manager" ||
              labels["component"] == "kube-controller-manager")
          prometheus/kubernetes-apiserver:
            config:
              config:
                scrape_configs:
                - authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                    type: Bearer
                  job_name: kubernetes-apiserver
                  metric_relabel_configs:
                  - action: keep
                    regex: (apiserver_longrunning_requests|apiserver_request_duration_seconds|apiserver_storage_objects|apiserver_response_sizes|apiserver_request_total|kubernetes_build_info|rest_client_requests_total|rest_client_request_duration_seconds|apiserver_storage_size_bytes|apiserver_requested_deprecated_apis)(?:_sum|_count|_bucket)?
                    source_labels:
                    - __name__
                  scheme: https
                  scrape_interval: 10s
                  static_configs:
                  - targets:
                    - '`endpoint`'
                  tls_config:
                    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecure_skip_verify: true
            rule: type == "port" && port == 443 && (pod.labels["k8s-app"] == "kube-apiserver"
              || pod.labels["component"] == "kube-apiserver")
          prometheus/kubernetes-proxy:
            config:
              config:
                scrape_configs:
                - job_name: kubernetes-proxy
                  metric_relabel_configs:
                  - action: keep
                    regex: (kubeproxy_sync_proxy_rules_iptables_restore_failures_total|kubeproxy_sync_proxy_rules_service_changes_total|kubeproxy_sync_proxy_rules_service_changes_pending|kubeproxy_sync_proxy_rules_duration_seconds|kubeproxy_network_programming_duration_seconds)(?:_sum|_count|_bucket)?
                    source_labels:
                    - __name__
                  - action: drop
                    regex: kubeproxy_network_programming_duration_seconds_bucket;(11\.0|12\.0|13\.0|14\.0|16\.0|17\.0|18\.0|19\.0|21\.0|22\.0|23\.0|24\.0|26\.0|27\.0|28\.0|29\.0|31\.0|32\.0|33\.0|34\.0|36\.0|37\.0|38\.0|39\.0|41\.0|42\.0|43\.0|44\.0|45\.0|46\.0|47\.0|48\.0|49\.0|51\.0|52\.0|52\.0|53\.0|54\.0|55\.0|56\.0|57\.0|58\.0|59\.0|65\.0|75\.0|85\.0|95\.0|85\.0|100\.0|110\.0|115\.0|270\.0)
                    source_labels:
                    - __name__
                    - le
                  scrape_interval: 10s
                  static_configs:
                  - targets:
                    - '`endpoint`:10249'
            rule: type == "pod" && labels["k8s-app"] == "kube-proxy"
          prometheus/kubernetes-scheduler:
            config:
              config:
                scrape_configs:
                - authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                    type: Bearer
                  job_name: kubernetes-scheduler
                  metric_relabel_configs:
                  - action: keep
                    regex: (rest_client_request_duration_seconds|rest_client_requests_total|scheduler_pending_pods|scheduler_schedule_attempts_total|scheduler_queue_incoming_pods_total|scheduler_preemption_attempts_total|scheduler_scheduling_algorithm_duration_seconds|scheduler_pod_scheduling_sli_duration_seconds)(?:_sum|_count|_bucket)?
                    source_labels:
                    - __name__
                  scheme: https
                  scrape_interval: 10s
                  static_configs:
                  - targets:
                    - '`endpoint`:10259'
                  tls_config:
                    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecure_skip_verify: true
            rule: type == "pod" && (labels["k8s-app"] == "kube-scheduler" || labels["component"]
              == "kube-scheduler")
        watch_observers:
        - k8s_observer
      zipkin:
        endpoint: 0.0.0.0:9411
    service:
      extensions:
      - health_check
      - headers_setter
      - k8s_observer
      - zpages
      pipelines:
        logs/entities:
          exporters:
          - otlp_http/entities
          processors:
          - memory_limiter
          - batch
          - resourcedetection
          - resource
          receivers:
          - nop
        metrics:
          exporters:
          - otlp_grpc
          - signalfx/host_metadata
          processors:
          - memory_limiter
          - batch
          - resourcedetection
          - resource
          receivers:
          - hostmetrics
          - kubeletstats
          - otlp
        metrics/agent:
          exporters:
          - otlp_grpc
          processors:
          - memory_limiter
          - batch
          - resource/add_agent_k8s
          - resourcedetection
          - resource
          - resource/add_mode
          receivers:
          - prometheus/agent
        metrics/histograms:
          exporters:
          - signalfx/histograms
          processors:
          - memory_limiter
          - batch
          - resource/add_agent_k8s
          - resourcedetection
          - resource
          receivers:
          - receiver_creator
        traces:
          exporters:
          - otlp_grpc
          - signalfx
          processors:
          - memory_limiter
          - k8s_attributes
          - batch
          - resourcedetection
          - resource
          receivers:
          - otlp
          - jaeger
          - zipkin
      telemetry:
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: localhost
                  port: 8889
                  without_scope_info: true
                  without_type_suffix: true
                  without_units: true
        resource:
          service.name: otel-agent
