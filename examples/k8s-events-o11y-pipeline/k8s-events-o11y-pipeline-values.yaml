clusterName: CHANGEME
splunkObservability:
  realm: CHANGEME
  accessToken: CHANGEME

# Disable the agent daemonset since this example focuses on the cluster receiver.
agent:
  enabled: false

clusterReceiver:
  # k8s_events receiver must be enabled for the pipeline to be active.
  eventsEnabled: true

featureGates:
  # Enable sending Kubernetes events to the Splunk Observability v3/event endpoint.
  # Configures the existing logs pipeline to route k8s events through an additional
  # otlp_http/o11y_events exporter with the "o11yevents" routing header.
  # Also enables sending k8s objects to the same endpoint, as k8s objects are enabled
  # by default.
  sendK8sEventsToSplunkO11y: true
