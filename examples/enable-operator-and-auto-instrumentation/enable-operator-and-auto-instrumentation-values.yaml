splunkObservability:
  metricsEnabled: true
  tracesEnabled: true
  accessToken: CHANGEME
  realm: us0
clusterName: CHANGEME
environment: CHANGEME

splunkPlatform:
  endpoint: CHANGEME
  token: CHANGEME
  logsEnabled: true

operatorcrds:
  install: true
operator:
  enabled: true
# See https://github.com/signalfx/splunk-otel-collector-chart/blob/main/docs/auto-instrumentation-install.md#instrumentation-cr-management
featureGates:
  instrumentationJobDeployment:
    enabled: true
instrumentation:
  spec:
    java:
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 100m
          memory: 200Mi
