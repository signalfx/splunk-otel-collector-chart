# Source: splunk-otel-collector/templates/operator/instrumentation-hook-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: default-splunk-otel-collector-inst-hook
  namespace: default
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: splunk-otel-collector-inst-hook
    spec:
      serviceAccountName: default-splunk-otel-collector-inst-hook
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: wait-operator
          image: "registry.k8s.io/kubectl:v1.35.1"
          command: ["kubectl", "wait", "--for=condition=Available", "--timeout=120s", "deployment/default-operator", "-n", "default"]
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: apply-cr
          image: "registry.k8s.io/kubectl:v1.35.1"
          command: ["kubectl", "apply", "-f", "/config/instrumentation.yaml"]
          volumeMounts:
            - name: cr-config
              mountPath: /config
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: cr-config
          configMap:
            name: default-splunk-otel-collector-inst-hook
