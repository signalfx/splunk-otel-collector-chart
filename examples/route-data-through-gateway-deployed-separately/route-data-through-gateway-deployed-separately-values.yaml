clusterName: CHANGEME
splunkObservability:
  realm: CHANGEME
  accessToken: CHANGEME

agent:
  config:
    exporters:
      otlp_grpc:
        endpoint: <custom-gateway-url>:4317
        tls:
          insecure: true
      signalfx:
        ingest_url: http://<custom-gateway-url>:9943
        api_url: http://<custom-gateway-url>:6060
    service:
      pipelines:
        traces:
          exporters: [otlp_grpc, signalfx]
        metrics:
          exporters: [otlp_grpc]
        logs:
          exporters: [otlp_grpc]

clusterReceiver:
  config:
    exporters:
      signalfx:
        ingest_url: http://<custom-gateway-url>:9943
        api_url: http://<custom-gateway-url>:6060
