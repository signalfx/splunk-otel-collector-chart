---
# Source: splunk-otel-collector/charts/targetallocator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: default-targetallocator-ta
  labels:
    helm.sh/chart: targetallocator-0.130.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-target-allocator
    app.kubernetes.io/version: "0.153.0"
    app.kubernetes.io/name: targetallocator
    app.kubernetes.io/instance: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: targetallocator
      app.kubernetes.io/instance: default
  template:
    metadata:
      annotations:
        checksum/config: 023f2e6a965fe478c5eb0879e315265ac47c0fa5d29737a0cbdaaa1f1105b102
      labels:
        helm.sh/chart: targetallocator-0.130.0
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: opentelemetry-target-allocator
        app.kubernetes.io/version: "0.153.0"
        app.kubernetes.io/name: targetallocator
        app.kubernetes.io/instance: default
    spec:
      serviceAccountName: default-targetallocator-ta
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: targetallocator
          image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.153.0
          ports:
            - containerPort: 8080
              name: http-port
          volumeMounts:
            - name: config-volume
              mountPath: /conf/
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: serviceaccount-token
              readOnly: true
          env: # Workaround for https://github.com/open-telemetry/opentelemetry-operator/pull/3976
            - name: OTELCOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 250m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config-volume
          configMap:
            name: default-targetallocator-ta-configmap
            items:
              - key: targetallocator.yaml
                path: targetallocator.yaml
        - name: serviceaccount-token
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
