suite: splunk-otel-collector.gatewayDeployment
values:
  - ./values/basic.yaml
release:
  name: test-release
  namespace: test-ns
templates:
  - deployment-gateway.yaml
  - configmap-gateway.yaml

tests:
  - it: should not render gateway deployment when gateway.enabled is false
    set:
      gateway:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render gateway deployment with default replicaCount
    template: deployment-gateway.yaml
    set:
      gateway:
        enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 3

  - it: should render gateway deployment with custom replicaCount
    template: deployment-gateway.yaml
    set:
      gateway:
        enabled: true
        replicaCount: 5
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 5

  - it: should not set replicas field when replicaCount is null (for HPA usage)
    template: deployment-gateway.yaml
    set:
      gateway:
        enabled: true
        replicaCount: null
    asserts:
      - isKind:
          of: Deployment
      - isNull:
          path: spec.replicas

  - it: should not configure headers_setter when gateway sends only to Splunk Platform
    template: configmap-gateway.yaml
    set:
      gateway:
        enabled: true
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        token: platform-token
    asserts:
      - notMatchRegex:
          path: data["relay"]
          pattern: "headers_setter"
      - notMatchRegex:
          path: data["relay"]
          pattern: "splunk_observability_access_token"

  - it: should configure headers_setter when gateway sends to Splunk Observability
    template: configmap-gateway.yaml
    set:
      gateway:
        enabled: true
      splunkObservability:
        realm: us0
        accessToken: o11y-token
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+headers_setter:"
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+- headers_setter"
