suite: imagePullSecrets propagation
values:
  - ./values/basic.yaml
release:
  name: test-release
  namespace: test-ns

tests:
  # ---------------------------------------------------------------------------
  # Shared ServiceAccount (agent DaemonSet, cluster receiver, gateway)
  # All three workloads reference splunk-otel-collector.serviceAccountName so
  # a single SA test covers all three pods.
  # ---------------------------------------------------------------------------
  - it: should set imagePullSecrets on the shared ServiceAccount
    template: serviceAccount.yaml
    set:
      serviceAccount:
        create: true
      image:
        imagePullSecrets:
          - my-registry-secret
    asserts:
      - equal:
          path: imagePullSecrets
          value:
            - name: my-registry-secret

  - it: should not set imagePullSecrets on the shared ServiceAccount when none configured
    template: serviceAccount.yaml
    set:
      serviceAccount:
        create: true
      image:
        imagePullSecrets: []
    asserts:
      - isNull:
          path: imagePullSecrets

  # ---------------------------------------------------------------------------
  # Secret validation hook pod (pre-install/pre-upgrade)
  # Uses pod-level imagePullSecrets since it has no dedicated ServiceAccount.
  # ---------------------------------------------------------------------------
  - it: should set imagePullSecrets on the secret-validation hook pod
    template: secret-splunk-validation-hook.yaml
    set:
      secret:
        create: false
        validateSecret: true
      image:
        imagePullSecrets:
          - my-registry-secret
    asserts:
      - equal:
          path: spec.imagePullSecrets
          value:
            - name: my-registry-secret

  - it: should not set imagePullSecrets on the secret-validation hook pod when none configured
    template: secret-splunk-validation-hook.yaml
    set:
      secret:
        create: false
        validateSecret: true
      image:
        imagePullSecrets: []
    asserts:
      - isNull:
          path: spec.imagePullSecrets

  # ---------------------------------------------------------------------------
  # Instrumentation hook job — dedicated ServiceAccount (document 0)
  # ---------------------------------------------------------------------------
  - it: should set imagePullSecrets on the instrumentation-hook-job ServiceAccount
    template: operator/instrumentation-hook-job.yaml
    values:
      - ./values/instrumentation_hook_job.yaml
    set:
      image:
        imagePullSecrets:
          - my-registry-secret
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: imagePullSecrets
          value:
            - name: my-registry-secret

  - it: should not set imagePullSecrets on the instrumentation-hook-job ServiceAccount when none configured
    template: operator/instrumentation-hook-job.yaml
    values:
      - ./values/instrumentation_hook_job.yaml
    set:
      image:
        imagePullSecrets: []
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - isNull:
          path: imagePullSecrets

  # ---------------------------------------------------------------------------
  # Operator deployment pod (opentelemetry-operator subchart)
  # Uses operator.imagePullSecrets in {name: <secret>} format (standard K8s
  # LocalObjectReference), unlike image.imagePullSecrets which uses plain strings.
  # ---------------------------------------------------------------------------
  - it: should set imagePullSecrets on the operator deployment pod
    template: charts/operator/templates/deployment.yaml
    values:
      - ./values/operator_default.yaml
    set:
      operator:
        imagePullSecrets:
          - name: my-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: my-registry-secret

  - it: should not set imagePullSecrets on the operator deployment pod when none configured
    template: charts/operator/templates/deployment.yaml
    values:
      - ./values/operator_default.yaml
    set:
      operator:
        imagePullSecrets: []
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets
