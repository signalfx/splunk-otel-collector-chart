suite: splunk-otel-collector.otlpLogIngest
values:
  - ./values/basic.yaml
release:
  name: test-release
  namespace: test-ns
templates:
  - configmap-agent.yaml
  - configmap-gateway.yaml
  - configmap-cluster-receiver.yaml
  - secret-splunk.yaml
  - secret-splunk-validation-hook.yaml
  - daemonset.yaml
  - deployment-gateway.yaml
  - deployment-cluster-receiver.yaml

tests:
  - it: should use OTLP gRPC platform logs exporter in agent, gateway, and cluster receiver
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
      clusterReceiver:
        eventsEnabled: true
        k8sObjects:
          - name: pods
            mode: pull
            interval: 5s
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+otlp/platform_logs:\\n\\s+endpoint: otlp-logs\\.example\\.com:4317"
      - notMatchRegex:
          path: data["relay"]
          pattern: "\\nsplunk_hec/platform_logs:"

  - it: should use OTLP gRPC platform logs exporter in gateway
    set:
      splunkObservability:
        realm: ""
      gateway:
        enabled: true
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: configmap-gateway.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+otlp/platform_logs:\\n\\s+endpoint: otlp-logs\\.example\\.com:4317"
      - notMatchRegex:
          path: data["relay"]
          pattern: "\\nsplunk_hec/platform_logs:"

  - it: should add kube events sourcetype via processor when platform logs are sent via OTLP
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
      clusterReceiver:
        eventsEnabled: true
    template: configmap-cluster-receiver.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "transform/add_events_sourcetype:"
      - matchRegex:
          path: data["relay"]
          pattern: "set\\(resource.attributes\\[\"com.splunk.sourcetype\"\\], \"kube:events\"\\)"
      - matchRegex:
          path: data["relay"]
          pattern: "- transform/add_events_sourcetype\\n\\s+- transform/k8sevents"

  - it: should use OTLP HTTP platform logs exporter when protocol is http
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: http://otlp-logs.example.com:4318
          protocol: http
      clusterReceiver:
        eventsEnabled: true
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+otlp_http/platform_logs:\\n\\s+endpoint: http://otlp-logs\\.example\\.com:4318"
      - notMatchRegex:
          path: data["relay"]
          pattern: "\\notlp/platform_logs:"

  - it: should not generate Splunk secret when logs are OTLP-only and no secret data is configured
    set:
      splunkObservability:
        realm: ""
      secret:
        create: true
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: secret-splunk.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate validation hook when logs are OTLP-only and no secret data is configured
    set:
      splunkObservability:
        realm: ""
      secret:
        create: false
        validateSecret: true
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: secret-splunk-validation-hook.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should validate custom secret for HEC token when metrics are sent to platform HEC
    set:
      splunkObservability:
        realm: ""
      secret:
        create: false
        validateSecret: true
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        logsEnabled: true
        metricsEnabled: true
        metricsIndex: metrics
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: secret-splunk-validation-hook.yaml
    asserts:
      - matchRegex:
          path: spec.containers[0].args[0]
          pattern: "if \\[ \"true\" = \"true\" \\] && \\[ ! -f /otel/secret/splunk_platform_hec_token \\]"

  - it: should include HEC token in generated secret when metrics are sent to platform HEC
    set:
      splunkObservability:
        realm: ""
      secret:
        create: true
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        token: abc
        logsEnabled: true
        metricsEnabled: true
        metricsIndex: metrics
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: secret-splunk.yaml
    asserts:
      - equal:
          path: data.splunk_platform_hec_token
          value: YWJj

  - it: should include Observability token in generated secret when Observability is enabled
    set:
      splunkObservability:
        realm: us0
        accessToken: abc
      secret:
        create: true
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
    template: secret-splunk.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.splunk_observability_access_token
          value: YWJj

  - it: should include HEC TLS files in generated secret when configured without HEC token
    set:
      splunkObservability:
        realm: ""
      secret:
        create: true
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        clientCert: cert
        clientKey: key
        caFile: ca
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: secret-splunk.yaml
    asserts:
      - equal:
          path: data.splunk_platform_hec_client_cert
          value: Y2VydA==
      - equal:
          path: data.splunk_platform_hec_client_key
          value: a2V5
      - equal:
          path: data.splunk_platform_hec_ca_file
          value: Y2E=

  - it: should use OTLP HTTP exporter in gateway when protocol is http
    set:
      splunkObservability:
        realm: ""
      gateway:
        enabled: true
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: http://otlp-logs.example.com:4318
          protocol: http
    template: configmap-gateway.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+otlp_http/platform_logs:\\n\\s+endpoint: http://otlp-logs\\.example\\.com:4318"
      - notMatchRegex:
          path: data["relay"]
          pattern: "\\notlp/platform_logs:"
      - notMatchRegex:
          path: data["relay"]
          pattern: "\\nsplunk_hec/platform_logs:"

  - it: should use OTLP exporter for logs and HEC exporter for metrics when both are enabled
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: https://hec.example.com/services/collector/event
        token: abc
        logsEnabled: true
        metricsEnabled: true
        metricsIndex: metrics
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+otlp/platform_logs:\\n\\s+endpoint: otlp-logs\\.example\\.com:4317"
      - matchRegex:
          path: data["relay"]
          pattern: "\\n\\s+splunk_hec/platform_metrics:"
      - notMatchRegex:
          path: data["relay"]
          pattern: "\\nsplunk_hec/platform_logs:"

  - it: should route k8sObjects logs to OTLP exporter when OTLP ingest is enabled
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
      clusterReceiver:
        k8sObjects:
          - name: pods
            mode: pull
            interval: 5s
    template: configmap-cluster-receiver.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "logs/objects:"
      - matchRegex:
          path: data["relay"]
          pattern: "logs/objects:[\\s\\S]+?- otlp/platform_logs"
      - notMatchRegex:
          path: data["relay"]
          pattern: "logs/objects:[\\s\\S]+?- splunk_hec/platform_logs"

  - it: should use insecure false by default for OTLP exporter
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "tls:\\n\\s+insecure: false"

  - it: should add default platform index for OTLP logs without overriding annotations
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        index: custom_logs
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "resource/otlp_platform_logs:\\n\\s+attributes:\\n\\s+- action: insert\\n\\s+key: com\\.splunk\\.index\\n\\s+value: custom_logs"
      - matchRegex:
          path: data["relay"]
          pattern: "- resource/logs\\n\\s+- resource/otlp_platform_logs"

  - it: should attach persistent queue storage to OTLP platform logs exporter
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        sendingQueue:
          persistentQueue:
            enabled: true
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "otlp/platform_logs:[\\s\\S]+?sending_queue:[\\s\\S]+?storage: file_storage/persistent_queue"

  - it: should render OTLP gRPC TLS file options
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
          insecureSkipVerify: true
          clientCert: cert
          clientKey: key
          caFile: ca
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "otlp/platform_logs:[\\s\\S]+?insecure: false"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp/platform_logs:[\\s\\S]+?insecure_skip_verify: true"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp/platform_logs:[\\s\\S]+?cert_file: /otel/etc/splunk_platform_otlp_client_cert"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp/platform_logs:[\\s\\S]+?key_file: /otel/etc/splunk_platform_otlp_client_key"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp/platform_logs:[\\s\\S]+?ca_file: /otel/etc/splunk_platform_otlp_ca_file"

  - it: should render OTLP HTTP TLS file options
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: http://otlp-logs.example.com:4318
          protocol: http
          insecureSkipVerify: true
          clientCert: cert
          clientKey: key
          caFile: ca
    template: configmap-agent.yaml
    asserts:
      - matchRegex:
          path: data["relay"]
          pattern: "otlp_http/platform_logs:[\\s\\S]+?insecure_skip_verify: true"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp_http/platform_logs:[\\s\\S]+?cert_file: /otel/etc/splunk_platform_otlp_client_cert"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp_http/platform_logs:[\\s\\S]+?key_file: /otel/etc/splunk_platform_otlp_client_key"
      - matchRegex:
          path: data["relay"]
          pattern: "otlp_http/platform_logs:[\\s\\S]+?ca_file: /otel/etc/splunk_platform_otlp_ca_file"

  - it: should include OTLP TLS files in generated secret
    set:
      splunkObservability:
        realm: ""
      secret:
        create: true
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
          clientCert: cert
          clientKey: key
          caFile: ca
    template: secret-splunk.yaml
    asserts:
      - equal:
          path: data.splunk_platform_otlp_client_cert
          value: Y2VydA==
      - equal:
          path: data.splunk_platform_otlp_client_key
          value: a2V5
      - equal:
          path: data.splunk_platform_otlp_ca_file
          value: Y2E=

  - it: should validate custom secret for OTLP TLS files when configured
    set:
      splunkObservability:
        realm: ""
      secret:
        create: false
        validateSecret: true
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
          clientCert: cert
          clientKey: key
          caFile: ca
    template: secret-splunk-validation-hook.yaml
    asserts:
      - matchRegex:
          path: spec.containers[0].args[0]
          pattern: "splunk_platform_otlp_client_cert"
      - matchRegex:
          path: spec.containers[0].args[0]
          pattern: "splunk_platform_otlp_client_key"
      - matchRegex:
          path: spec.containers[0].args[0]
          pattern: "splunk_platform_otlp_ca_file"

  - it: should mount Splunk secret on agent when OTLP TLS files are configured
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
          caFile: ca
    template: daemonset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: secret
            mountPath: /otel/etc
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret
            secret:
              secretName: test-release-splunk-otel-collector

  - it: should mount Splunk secret on gateway when OTLP TLS files are configured
    set:
      splunkObservability:
        realm: ""
      gateway:
        enabled: true
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
          caFile: ca
    template: deployment-gateway.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: secret
            mountPath: /otel/etc
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret
            secret:
              secretName: test-release-splunk-otel-collector

  - it: should mount Splunk secret on cluster receiver when OTLP TLS files are configured
    set:
      splunkObservability:
        realm: ""
      splunkPlatform:
        endpoint: ""
        token: ""
        logsEnabled: true
        metricsEnabled: false
        tracesEnabled: false
        otlpIngest:
          enabled: true
          endpoint: otlp-logs.example.com:4317
          protocol: grpc
          caFile: ca
    template: deployment-cluster-receiver.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: secret
            mountPath: /otel/etc
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: secret
            secret:
              secretName: test-release-splunk-otel-collector
