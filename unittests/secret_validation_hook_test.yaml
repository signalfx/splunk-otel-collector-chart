suite: secret validation hook
values:
  - ./values/basic.yaml
release:
  name: test-release
  namespace: test-ns

tests:
  - it: should target Linux nodes when collectors run on Windows
    templates:
      - secret-splunk-validation-hook.yaml
      - daemonset.yaml
      - deployment-cluster-receiver.yaml
    set:
      isWindows: true
      secret:
        create: false
        validateSecret: true
    asserts:
      - equal:
          path: spec.automountServiceAccountToken
          value: false
        template: secret-splunk-validation-hook.yaml
      - equal:
          path: spec.nodeSelector
          value:
            kubernetes.io/os: linux
        template: secret-splunk-validation-hook.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/os: windows
        template: daemonset.yaml
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/os: windows
        template: deployment-cluster-receiver.yaml
