name: Lint and Test Charts

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 #v4
        with:
          version: v4.1.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.12.0

      - name: Set up chart dependencies
        run: make dep-update

      - name: Render all examples
        run: make render

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config=ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: make lint

      - name: Run helm unit tests
        run: |
          helm plugin install --verify=false --version 6f82a998e0b5461762ca959f87f5dd344af5e4eb https://github.com/helm-unittest/helm-unittest # v1.0.3
          make unittest

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Run chart-testing (install)
        run: ct install --config=ct.yaml
        if: steps.list-changed.outputs.changed == 'true'

  lint-test-v3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm v3
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 #v4
        with:
          version: v3.20.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.12.0

      - name: Set up chart dependencies
        run: make dep-update

      - name: Render all examples
        run: make render

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config=ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: make lint

      - name: Run helm unit tests
        run: |
          helm plugin install --version 6f82a998e0b5461762ca959f87f5dd344af5e4eb https://github.com/helm-unittest/helm-unittest # v1.0.3
          make unittest

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Run chart-testing (install)
        run: ct install --config=ct.yaml
        if: steps.list-changed.outputs.changed == 'true'
