name: functional-tests

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      UPDATE_EXPECTED_RESULTS:
        description: 'UPDATE_EXPECTED_RESULTS: Set this to true to update the golden file expected test results (if applicable) and upload them as a GitHub workflow run artifact.'
        required: false
        default: false
        type: choice
        options:
          - false
          - true
      KUBERNETES_DEBUG_INFO:
        description: 'KUBERNETES_DEBUG_INFO: Set this to true to collect the debug info of the k8s cluster and upload this info as a Github workflow artifact.'
        required: false
        default: false
        type: choice
        options:
          - false
          - true
      COLLECTOR_IMAGE:
        description: 'COLLECTOR_IMAGE: Optional collector image override for cloud functional tests. Must be a quay.io/signalfx/* image.'
        required: false
        default: 'quay.io/signalfx/splunk-otel-collector-dev:latest'
        type: string

permissions:
  contents: read

env:
  GO_VERSION: 1.26.2
  # Make sure to exit early if cache segment download times out after 2 minutes.
  # We limit cache download as a whole to 5 minutes.
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2
jobs:
  get-test-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: get matrix
        id: test_matrix
        run: |
          echo "Getting test matrix"
          matrix=$(jq -r '.functional_test_v2 | tostring' ci-matrix.json | tr -d '\n')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
    outputs:
      matrix: ${{ steps.test_matrix.outputs.matrix }}

  collector-image-config:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
      REPOSITORY: ${{ github.repository }}
      REF: ${{ github.ref }}
      PR_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name || '' }}
      PR_USER_LOGIN: ${{ github.event.pull_request.user.login || '' }}
      COLLECTOR_IMAGE: ${{ github.event.inputs.COLLECTOR_IMAGE || '' }}
    outputs:
      cloud-tests-enabled: ${{ steps.config.outputs.cloud-tests-enabled }}
      gke-autopilot-allowed: ${{ steps.config.outputs.gke-autopilot-allowed }}
      otelcol-image: ${{ steps.config.outputs.otelcol-image }}
    steps:
      - name: Resolve collector image and cloud-test gating
        id: config
        run: |
          cloud_tests_enabled=false
          # GKE Autopilot's admission webhook will reject the agent
          # DaemonSet (hostNetwork / hostPath) unless the container
          # image matches Splunk's registered Autopilot WorkloadAllowlist,
          # which is keyed on the quay.io/signalfx/splunk-otel-collector
          # repository.
          gke_autopilot_allowed=true

          case "$EVENT_NAME" in
            workflow_dispatch)
              if [[ -n "$COLLECTOR_IMAGE" && "$COLLECTOR_IMAGE" != quay.io/signalfx/* ]]; then
                echo "::error::COLLECTOR_IMAGE must be a quay.io/signalfx/* image"
                exit 1
              fi
              cloud_tests_enabled=true
              ;;
            pull_request)
              if [[ "$PR_REPO_FULL_NAME" == "$REPOSITORY" && "$PR_USER_LOGIN" != "dependabot[bot]" ]]; then
                cloud_tests_enabled=true
              fi
              ;;
            *)
              if [[ "$REF" == "refs/heads/main" ]]; then
                cloud_tests_enabled=true
              fi
              ;;
          esac

          # When COLLECTOR_IMAGE is empty the chart default is used, so leave gke_autopilot_allowed=true.
          if [[ -n "$COLLECTOR_IMAGE" ]]; then
            collector_repo="${COLLECTOR_IMAGE%:*}"
            if [[ "$collector_repo" != "quay.io/signalfx/splunk-otel-collector" ]]; then
              gke_autopilot_allowed=false
              echo "::notice::GKE Autopilot tests will be skipped because COLLECTOR_IMAGE='${COLLECTOR_IMAGE}' is not the stable quay.io/signalfx/splunk-otel-collector image."
            fi
          fi

          {
            echo "cloud-tests-enabled=${cloud_tests_enabled}"
            echo "gke-autopilot-allowed=${gke_autopilot_allowed}"
            echo "otelcol-image=${COLLECTOR_IMAGE}"
          } >> "$GITHUB_OUTPUT"

  kubernetes-test:
    env:
      KUBE_TEST_ENV: kind
      UPDATE_EXPECTED_RESULTS: ${{ github.event.inputs.UPDATE_EXPECTED_RESULTS || 'false' }}
      KUBERNETES_DEBUG_INFO: ${{ github.event.inputs.KUBERNETES_DEBUG_INFO || 'false' }}
    needs:
      - get-test-matrix
      - collector-image-config
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.get-test-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/functional-test
        with:
          k8s-version: ${{ matrix.k8s-kind-version }}
          suite: ${{ matrix.test-job }}
          go-version: ${{ env.GO_VERSION }}
          update-expected-results: ${{ env.UPDATE_EXPECTED_RESULTS }}
          kubernetes-debug-info: ${{ env.KUBERNETES_DEBUG_INFO }}
          artifact-suffix: ${{ matrix.test-job }}-${{ matrix.k8s-kind-version }}
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  eks-test:
    name: Test helm install in EKS - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eks-kube-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-eks
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-1
          aws-cluster-name: rotel-eks

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: eks
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  eks-upgrade-test:
    name: Test helm upgrade in EKS - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eks-kube-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-eks
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-1
          aws-cluster-name: rotel-eks

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: eks
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          upgrade-from-values: eks_upgrade_from_previous_release_values.yaml

  gke-autopilot-test:
    name: Test helm install in GKE/Autopilot - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' && needs.collector-image-config.outputs.gke-autopilot-allowed == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/gke-kube-context
        with:
          gke-project-id: ${{ secrets.GKE_PROJECT }}
          gke-credentials-json: ${{ secrets.GKE_SA_KEY }}
          gke-cluster-name: ${{ secrets.GKE_AUTOPILOT_CLUSTER }}
          gke-location: ${{ secrets.GKE_REGION }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: gke/autopilot
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  gke-autopilot-upgrade-test:
    name: Test helm upgrade in GKE/Autopilot - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' && needs.collector-image-config.outputs.gke-autopilot-allowed == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/gke-kube-context
        with:
          gke-project-id: ${{ secrets.GKE_PROJECT }}
          gke-credentials-json: ${{ secrets.GKE_SA_KEY }}
          gke-cluster-name: ${{ secrets.GKE_AUTOPILOT_CLUSTER }}
          gke-location: ${{ secrets.GKE_REGION }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: gke/autopilot
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          skip-tests: "true"
          upgrade-from-values: gke_autopilot_upgrade_from_previous_release_values.yaml

  aks-windows-test:
    name: Test helm install in AKS - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/aks-kube-context
        with:
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          aks-resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          aks-cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: aks
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  aks-windows-upgrade-test:
    name: Test helm upgrade in AKS - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/aks-kube-context
        with:
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          aks-resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          aks-cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: aks
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  gce-autopilot-test:
    name: Test helm install in GCE (kops) - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/kubeconfig-secret-context
        with:
          kubeconfig-path: /tmp/kubeconfig
          kubeconfig-content: ${{ secrets.GCE_KUBECONFIG }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: gce
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  eks-fargate-test:
    name: Test helm install in EKS Fargate - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eks-kube-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-eks-fargate
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-2
          aws-cluster-name: gdi-github-eks-fargate

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: eks/fargate
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          skip-tests: "true" # we need to skip functional tests as we have not set probes to listen to the traffic.

  eks-fargate-upgrade-test:
    name: Test helm upgrade in EKS Fargate - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eks-kube-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-eks-fargate
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-2
          aws-cluster-name: gdi-github-eks-fargate

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: eks/fargate
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          skip-tests: "true" # we need to skip functional tests as we have not set probes to listen to the traffic.
          upgrade-from-values: eks_fargate_upgrade_from_previous_release_values.yaml

  eks-auto-mode-test:
    name: Test helm install in EKS Auto Mode - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eks-kube-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-eks-auto-mode
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-2
          aws-cluster-name: rotel-eks-autotest

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: eks/auto-mode
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  eks-auto-mode-upgrade-test:
    name: Test helm upgrade in EKS Auto Mode - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eks-kube-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-eks-auto-mode
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-2
          aws-cluster-name: rotel-eks-autotest

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: eks/auto-mode
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          upgrade-from-values: eks_auto_mode_upgrade_from_previous_release_values.yaml

  rosa-test:
    name: Test helm install in ROSA - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/kubeconfig-secret-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-rosa
          kubeconfig-content: ${{ secrets.ROSA_KUBECONFIG }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: rosa
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  rosa-upgrade-test:
    name: Test helm upgrade in ROSA - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/kubeconfig-secret-context
        with:
          kubeconfig-path: /tmp/kube-config-splunk-otel-collector-chart-functional-testing-rosa
          kubeconfig-content: ${{ secrets.ROSA_KUBECONFIG }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: rosa
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          upgrade-from-values: rosa_upgrade_from_previous_release_values.yaml

  gke-test:
    name: Test helm install in GKE - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/gke-kube-context
        with:
          gke-project-id: ${{ secrets.GKE_PROJECT }}
          gke-credentials-json: ${{ secrets.GKE_SA_KEY }}
          gke-cluster-name: ${{ secrets.GKE_CLUSTER }}
          gke-location: ${{ secrets.GKE_REGION }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          kube-test-env: gke
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}

  gke-upgrade-test:
    name: Test helm upgrade in GKE - credentials needed
    needs: collector-image-config
    if: ${{ needs.collector-image-config.outputs.cloud-tests-enabled == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'Ignore Tests') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/gke-kube-context
        with:
          gke-project-id: ${{ secrets.GKE_PROJECT }}
          gke-credentials-json: ${{ secrets.GKE_SA_KEY }}
          gke-cluster-name: ${{ secrets.GKE_CLUSTER }}
          gke-location: ${{ secrets.GKE_REGION }}

      - uses: ./.github/actions/cloud-functional-test
        with:
          go-version: ${{ env.GO_VERSION }}
          mode: upgrade
          kube-test-env: gke
          otelcol-image: ${{ needs.collector-image-config.outputs.otelcol-image }}
          skip-tests: "true"
          upgrade-from-values: gke_upgrade_from_previous_release_values.yaml
