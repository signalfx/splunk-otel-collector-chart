name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Install Helm
      uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a #v4
      with:
        version: v4.1.1
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Run pre-commit
      uses: ./.github/actions/run-precommit
      with:
        continue-on-error: 'false'
