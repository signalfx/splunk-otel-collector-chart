name: Dev Image Tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      collector_image:
        description: 'Collector image to test (repository:tag)'
        required: false
        default: 'quay.io/signalfx/splunk-otel-collector-dev:latest'
      KUBERNETES_DEBUG_INFO:
        description: 'Collect k8s cluster debug info and upload as artifact'
        required: false
        default: false
        type: choice
        options:
          - false
          - true

permissions:
  contents: read

env:
  GO_VERSION: 1.26.2
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2
  COLLECTOR_IMAGE: ${{ github.event.inputs.collector_image || 'quay.io/signalfx/splunk-otel-collector-dev:latest' }}

jobs:
  # ── Step 1: patch values.yaml with the dev image ───────────────────────────
  set-image:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.parse.outputs.image_repository }}
      image_tag: ${{ steps.parse.outputs.image_tag }}
    steps:
      - name: Parse image into repository and tag
        id: parse
        run: |
          IMAGE="${COLLECTOR_IMAGE}"
          # Split on the last colon to separate repo from tag
          IMAGE_REPOSITORY="${IMAGE%:*}"
          IMAGE_TAG="${IMAGE##*:}"
          # If no colon was found (no tag), treat the whole string as repo with latest tag
          if [[ "$IMAGE_REPOSITORY" == "$IMAGE_TAG" ]]; then
            IMAGE_TAG="latest"
          fi
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Using repository=${IMAGE_REPOSITORY} tag=${IMAGE_TAG}"

  # ── Step 2: functional tests (kind) ────────────────────────────────────────
  get-test-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get test matrix
        id: test_matrix
        run: |
          matrix=$(jq -r '.functional_test_v2 | tostring' ci-matrix.json | tr -d '\n')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
    outputs:
      matrix: ${{ steps.test_matrix.outputs.matrix }}

  functional-test:
    name: K8s ${{ matrix.k8s-kind-version }} / ${{ matrix.test-job }}
    runs-on: ubuntu-latest
    needs: [set-image, get-test-matrix]
    env:
      KUBECONFIG: /tmp/kube-config-splunk-otel-collector-chart-functional-testing
      KUBE_TEST_ENV: kind
      KUBERNETES_DEBUG_INFO: ${{ github.event.inputs.KUBERNETES_DEBUG_INFO || 'false' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.get-test-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: '**/go.sum'

      - name: Update chart image to dev image
        run: |
          yq e '.image.otelcol.repository = "${{ needs.set-image.outputs.image_repository }}"' -i helm-charts/splunk-otel-collector/values.yaml
          yq e '.image.otelcol.tag = "${{ needs.set-image.outputs.image_tag }}"' -i helm-charts/splunk-otel-collector/values.yaml

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.k8s-kind-version }}
          kubectl_version: ${{ matrix.k8s-kind-version }}
          cluster_name: kind
          config: ./.github/workflows/configs/kind-config.yaml

      - name: Fix kubelet TLS server certificates
        run: |
          kubectl get csr -o=jsonpath='{range.items[?(@.spec.signerName=="kubernetes.io/kubelet-serving")]}{.metadata.name}{" "}{end}' | xargs kubectl certificate approve

      - name: Update dependencies
        run: make dep-update

      - name: Build and load test images into kind
        run: make kind-build-test-images

      - name: Run functional tests
        id: run-functional-tests
        env:
          K8S_VERSION: ${{ matrix.k8s-kind-version }}
        run: |
          TEARDOWN_BEFORE_SETUP=true SUITE=${{ matrix.test-job }} make functionaltest

      - name: Collect Kubernetes Cluster debug info on failure
        if: always() && (steps.run-functional-tests.outcome == 'failure' || env.KUBERNETES_DEBUG_INFO == 'true')
        id: collect-debug-info
        run: |
          cd tools
          ./splunk_kubernetes_debug_info.sh

      - name: Upload Kubernetes Cluster debug info
        if: always() && (steps.run-functional-tests.outcome == 'failure' || env.KUBERNETES_DEBUG_INFO == 'true')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: k8s-debug-info-${{ matrix.test-job }}-${{ matrix.k8s-kind-version }}
          path: tools/splunk_kubernetes_debug_info_*
          retention-days: 5
