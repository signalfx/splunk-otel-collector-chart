# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: local
    hooks:
    - id: render
      name: Create the rendered Kubernetes manifest resources for the project examples
      entry: bash ci_scripts/check-render.sh
      language: system
      pass_filenames: false
    - id: go-fmt
      name: Go Format
      entry: make gofmt-all
      language: system
      files: '\.go$'
      pass_filenames: false
    - id: go-lint
      name: Go Lint
      entry: make golint-all
      language: system
      files: '\.go$'
      pass_filenames: false
    - id: go-mod-tidy
      name: Go Mod Tidy
      entry: make tidy-all
      language: system
      files: '(\.go$|go\.mod$|go\.sum$)'
      pass_filenames: false
    - id: actions-pin-check
      name: Check GitHub Actions are pinned to SHA
      entry: bash ci_scripts/check-actions-pinned.sh
      language: system
      files: '^\.github/(workflows|actions)/'
      pass_filenames: false
    - id: actions-permissions-check
      name: Check GitHub Actions workflows declare permissions
      entry: bash ci_scripts/check-actions-permissions.sh
      language: system
      files: '^\.github/(workflows|actions)/'
      pass_filenames: false
    - id: actionlint
      name: Lint GitHub Actions workflows
      entry: bash -c 'actionlint .github/workflows/*.yaml'
      language: system
      files: '^\.github/workflows/'
      pass_filenames: false
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
    - id: trailing-whitespace
      exclude: '^examples|^test|^CHANGELOG\.md$'
    - id: end-of-file-fixer
      exclude: "^examples|^test"
    - id: pretty-format-json
      args:
        - --autofix
        - --no-sort-keys
    - id: check-json
    - id: check-yaml
      # Can't check source yaml since it has go templates in it.
      exclude: "^helm-charts"
      args: [ --allow-multiple-documents ]
    - id: check-added-large-files
      args: [ --maxkb=5000 ]
