{{- if .Values.opampBridge.enabled }}
{{- $namespace := include "splunk-otel-collector.namespace" . }}
{{- $bridgeName := include "splunk-otel-collector.opampBridgeName" . }}
{{- $configMapName := include "splunk-otel-collector.opampBridgeConfigMapName" . }}
{{- $serviceAccountName := include "splunk-otel-collector.opampBridgeServiceAccountName" . }}
{{- $agentEnabled := and .Values.agent.enabled (ne .Values.distribution "eks/fargate") }}
{{- $clusterReceiverEnabled := eq (include "splunk-otel-collector.clusterReceiverEnabled" .) "true" }}
{{- $agentManaged := and $agentEnabled .Values.opampBridge.workloads.agent.enabled }}
{{- $gatewayManaged := and .Values.gateway.enabled .Values.opampBridge.workloads.gateway.enabled }}
{{- $clusterReceiverManaged := and $clusterReceiverEnabled .Values.opampBridge.workloads.clusterReceiver.enabled }}
{{- if not (or $agentManaged $gatewayManaged $clusterReceiverManaged (gt (len .Values.opampBridge.extraAgents) 0)) }}
{{- fail "/opampBridge requires at least one managed collector workload: enable agent, gateway, clusterReceiver, or set opampBridge.extraAgents" }}
{{- end }}
{{- if .Values.opampBridge.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: true
{{- if .Values.image.imagePullSecrets }}
imagePullSecrets:
{{- range .Values.image.imagePullSecrets }}
  - name: {{ . }}
{{- end }}
{{- end }}
metadata:
  name: {{ $serviceAccountName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: opamp-bridge
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
  {{- if .Values.opampBridge.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.opampBridge.serviceAccount.annotations | nindent 4 }}
  {{- end }}
---
{{ end }}
{{- if .Values.opampBridge.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $bridgeName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: opamp-bridge
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - update
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $bridgeName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: opamp-bridge
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $bridgeName }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $namespace }}
---
{{ end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configMapName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: opamp-bridge
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
data:
  config.yaml: |
    mode: standalone
    endpoint: {{ include "splunk-otel-collector.opampBridgeEndpoint" . | quote }}
    healthListenAddr: ":8081"
    heartbeatInterval: {{ .Values.opampBridge.heartbeatInterval | quote }}
    name: {{ $bridgeName | quote }}
    {{- if .Values.opampBridge.tls }}
    tls:
      {{- toYaml .Values.opampBridge.tls | nindent 6 }}
    {{- end }}
    {{- if or .Values.opampBridge.headers (eq (include "splunk-otel-collector.splunkO11yEnabled" .) "true") }}
    headers:
      {{- if .Values.opampBridge.headers }}
      {{- toYaml .Values.opampBridge.headers | nindent 6 }}
      {{- else }}
      X-SF-Token: "${SPLUNK_OBSERVABILITY_ACCESS_TOKEN}"
      {{- end }}
    {{- end }}
    capabilities:
      {{- toYaml .Values.opampBridge.capabilities | nindent 6 }}
    {{- if .Values.opampBridge.componentsAllowed }}
    componentsAllowed:
      {{- toYaml .Values.opampBridge.componentsAllowed | nindent 6 }}
    {{- end }}
    {{- with .Values.opampBridge.description.non_identifying_attributes }}
    description:
      non_identifying_attributes:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    standalone:
      agents:
        {{- if $agentManaged }}
        - namespace: {{ $namespace | quote }}
          type: {{ .Values.opampBridge.workloads.agent.type }}
          description:
            non_identifying_attributes:
              {{- include "splunk-otel-collector.opampBridgeWorkloadAttributes" (dict "workload" .Values.opampBridge.workloads.agent) | nindent 14 }}
          workloadRef:
            apiVersion: apps/v1
            kind: DaemonSet
            name: {{ printf "%s-agent" (include "splunk-otel-collector.fullname" .) | quote }}
          config:
            {{ .Values.opampBridge.workloads.agent.configName }}:
              kind: configmap
              name: {{ printf "%s-otel-agent" (include "splunk-otel-collector.fullname" .) | quote }}
              key: relay
        {{- end }}
        {{- if $gatewayManaged }}
        - namespace: {{ $namespace | quote }}
          type: {{ .Values.opampBridge.workloads.gateway.type }}
          description:
            non_identifying_attributes:
              {{- include "splunk-otel-collector.opampBridgeWorkloadAttributes" (dict "workload" .Values.opampBridge.workloads.gateway) | nindent 14 }}
          workloadRef:
            apiVersion: apps/v1
            kind: {{ if eq (default "deployment" .Values.gateway.mode) "statefulset" }}StatefulSet{{ else }}Deployment{{ end }}
            name: {{ include "splunk-otel-collector.fullname" . | quote }}
          config:
            {{ .Values.opampBridge.workloads.gateway.configName }}:
              kind: configmap
              name: {{ printf "%s-otel-collector" (include "splunk-otel-collector.fullname" .) | quote }}
              key: relay
        {{- end }}
        {{- if $clusterReceiverManaged }}
        - namespace: {{ $namespace | quote }}
          type: {{ .Values.opampBridge.workloads.clusterReceiver.type }}
          description:
            non_identifying_attributes:
              {{- include "splunk-otel-collector.opampBridgeWorkloadAttributes" (dict "workload" .Values.opampBridge.workloads.clusterReceiver) | nindent 14 }}
          workloadRef:
            apiVersion: apps/v1
            kind: {{ if eq .Values.distribution "eks/fargate" }}StatefulSet{{ else }}Deployment{{ end }}
            name: {{ if eq .Values.distribution "eks/fargate" }}{{ include "splunk-otel-collector.clusterReceiverTruncatedName" . | quote }}{{ else }}{{ printf "%s-k8s-cluster-receiver" (include "splunk-otel-collector.fullname" .) | quote }}{{ end }}
          config:
            {{ .Values.opampBridge.workloads.clusterReceiver.configName }}:
              kind: configmap
              name: {{ printf "%s-otel-k8s-cluster-receiver" (include "splunk-otel-collector.fullname" .) | quote }}
              key: relay
        {{- end }}
        {{- with .Values.opampBridge.extraAgents }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $bridgeName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: opamp-bridge
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ template "splunk-otel-collector.name" . }}
      component: opamp-bridge
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ template "splunk-otel-collector.name" . }}
        component: opamp-bridge
        release: {{ .Release.Name }}
        {{- if .Values.opampBridge.podLabels }}
        {{- toYaml .Values.opampBridge.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ printf "%s\n%s" (toYaml .Values.opampBridge) (include "splunk-otel-collector.opampBridgeEndpoint" .) | sha256sum }}
        {{- if .Values.opampBridge.podAnnotations }}
        {{- toYaml .Values.opampBridge.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      {{- if .Values.image.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.image.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- with .Values.opampBridge.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.opampBridge.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.opampBridge.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.opampBridge.tolerations }}
      tolerations:
        {{- toYaml .Values.opampBridge.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.opampBridge.affinity }}
      affinity:
        {{- toYaml .Values.opampBridge.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.opampBridge.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.opampBridge.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      {{- if .Values.opampBridge.priorityClassName }}
      priorityClassName: {{ .Values.opampBridge.priorityClassName }}
      {{- end }}
      containers:
        - name: bridge
          image: {{ include "splunk-otel-collector.image.opampBridge" . }}
          imagePullPolicy: {{ .Values.image.opampBridge.pullPolicy }}
          args:
            - --config-file=/conf/config.yaml
            - --mode=standalone
          {{- if or (eq (include "splunk-otel-collector.splunkO11yEnabled" .) "true") .Values.opampBridge.extraEnvs }}
          env:
            {{- if eq (include "splunk-otel-collector.splunkO11yEnabled" .) "true" }}
            - name: SPLUNK_OBSERVABILITY_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "splunk-otel-collector.secret" . }}
                  key: splunk_observability_access_token
            {{- end }}
            {{- with .Values.opampBridge.extraEnvs }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
          {{- end }}
          ports:
            - name: healthz
              containerPort: 8081
              protocol: TCP
          {{- with .Values.opampBridge.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.opampBridge.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            {{- if .Values.opampBridge.extraVolumeMounts }}
            {{- toYaml .Values.opampBridge.extraVolumeMounts | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ $configMapName }}
        {{- if .Values.opampBridge.extraVolumes }}
        {{- toYaml .Values.opampBridge.extraVolumes | nindent 8 }}
        {{- end }}
{{- end }}
