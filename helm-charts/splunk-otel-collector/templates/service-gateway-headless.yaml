{{- $gatewayMode := default "deployment" .Values.gateway.mode }}
{{- if and .Values.gateway.enabled (eq $gatewayMode "statefulset") (dig "headlessService" "enabled" false .Values.gateway) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "splunk-otel-collector.gatewayHeadlessServiceName" . }}
  namespace: {{ template "splunk-otel-collector.namespace" . }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: otel-collector
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
{{- with .Values.gateway.headlessService.annotations }}
  annotations:
{{ toYaml . | trim | nindent 4 }}
{{- end }}
spec:
  clusterIP: None
  ports:
{{- include "splunk-otel-collector.gatewayServicePorts" . | trim | nindent 4 }}
  selector:
    app: {{ template "splunk-otel-collector.name" . }}
    component: otel-collector
    release: {{ .Release.Name }}
{{- end }}
