{{- $svc := (include "splunk-otel-collector.getServiceConfig" (dict "context" . "svc" .Values.gateway.service) | fromYaml) }}
{{ if and .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "splunk-otel-collector.gatewayServiceName" . }}
  namespace: {{ template "splunk-otel-collector.namespace" . }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
    app: {{ template "splunk-otel-collector.name" . }}
    component: otel-collector
    chart: {{ template "splunk-otel-collector.chart" . }}
    release: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
{{- with $svc.annotations }}
  annotations:
{{ toYaml . | trim | indent 4 }}
{{- end }}
spec:
  type: {{ $svc.type }}
  {{- if $svc.trafficDistribution }}
  trafficDistribution: {{ $svc.trafficDistribution }}
  {{- end }}
  ports:
{{- include "splunk-otel-collector.gatewayServicePorts" . | trim | nindent 2 }}
  selector:
    app: {{ template "splunk-otel-collector.name" . }}
    component: otel-collector
    release: {{ .Release.Name }}
{{- end }}
