{{- if and
  (not .Values.secret.create)
  .Values.secret.validateSecret
  (or
    (eq (include "splunk-otel-collector.splunkO11yEnabled" .) "true")
    (eq (include "splunk-otel-collector.platformHecTokenRequired" .) "true")
    (eq (include "splunk-otel-collector.platformTlsSecretMountRequired" .) "true"))
}}
# Helm hook validating that custom secret provided by user has all the required
# fields.
apiVersion: v1
kind: Pod
metadata:
  name: {{ template "splunk-otel-collector.fullname" . }}-validate-secret
  namespace: {{ template "splunk-otel-collector.namespace" . }}
  labels:
    {{- include "splunk-otel-collector.commonLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  {{- $podSecurityContext := include "splunk-otel-collector.podSecurityContext" (dict "isWindows" false "podSecurityContext" dict) }}
  {{- if $podSecurityContext }}
  securityContext:
    {{- $podSecurityContext | nindent 4 }}
  {{- end }}
  nodeSelector:
    kubernetes.io/os: linux
  {{- with .Values.secret.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  restartPolicy: Never
  containers:
  - name: validate-secret
    image: {{ template "splunk-otel-collector.image.validateSecret" . }}
    imagePullPolicy: {{ .Values.image.validateSecret.pullPolicy }}
    command: ["sh", "-c"]
    args:
      - if [ "{{ include "splunk-otel-collector.splunkO11yEnabled" . }}" = "true" ] && [ ! -f /otel/secret/splunk_observability_access_token ]; then
          echo Splunk Observability destination is enabled, but custom\
          Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_observability_access_token\".;
          export TOKEN_INVALID=true;
        fi;
        if [ "{{ include "splunk-otel-collector.platformHecTokenRequired" . }}" = "true" ] && [ ! -f /otel/secret/splunk_platform_hec_token ]; then
          echo Splunk Platform destination is enabled, but custom Kubernetes\
          secret \"{{ template "splunk-otel-collector.secret" . }}\" doesn\'t\
          have required field \"splunk_platform_hec_token\".;
          export TOKEN_INVALID=true;
        fi;
        {{- if .Values.splunkPlatform.clientCert }}
        if [ ! -f /otel/secret/splunk_platform_hec_client_cert ]; then
          echo Splunk Platform HEC TLS client certificate is configured, but custom\
          Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_platform_hec_client_cert\".;
          export TOKEN_INVALID=true;
        fi;
        {{- end }}
        {{- if .Values.splunkPlatform.clientKey }}
        if [ ! -f /otel/secret/splunk_platform_hec_client_key ]; then
          echo Splunk Platform HEC TLS client key is configured, but custom\
          Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_platform_hec_client_key\".;
          export TOKEN_INVALID=true;
        fi;
        {{- end }}
        {{- if .Values.splunkPlatform.caFile }}
        if [ ! -f /otel/secret/splunk_platform_hec_ca_file ]; then
          echo Splunk Platform HEC TLS CA certificate is configured, but custom\
          Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_platform_hec_ca_file\".;
          export TOKEN_INVALID=true;
        fi;
        {{- end }}
        {{- if .Values.splunkPlatform.otlpIngest.clientCert }}
        if [ ! -f /otel/secret/splunk_platform_otlp_client_cert ]; then
          echo Splunk Platform OTLP TLS client certificate is configured, but\
          custom Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_platform_otlp_client_cert\".;
          export TOKEN_INVALID=true;
        fi;
        {{- end }}
        {{- if .Values.splunkPlatform.otlpIngest.clientKey }}
        if [ ! -f /otel/secret/splunk_platform_otlp_client_key ]; then
          echo Splunk Platform OTLP TLS client key is configured, but custom\
          Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_platform_otlp_client_key\".;
          export TOKEN_INVALID=true;
        fi;
        {{- end }}
        {{- if .Values.splunkPlatform.otlpIngest.caFile }}
        if [ ! -f /otel/secret/splunk_platform_otlp_ca_file ]; then
          echo Splunk Platform OTLP TLS CA certificate is configured, but custom\
          Kubernetes secret \"{{ template "splunk-otel-collector.secret" . }}\"\
          doesn\'t have required field \"splunk_platform_otlp_ca_file\".;
          export TOKEN_INVALID=true;
        fi;
        {{- end }}
        if [ "$TOKEN_INVALID" = "true" ]; then
          echo Please update the secret.;
          exit 1;
        fi
    volumeMounts:
      - name: secret
        mountPath: /otel/secret
        readOnly: true
  volumes:
    - name: secret
      secret:
        secretName: {{ template "splunk-otel-collector.secret" . }}
        defaultMode: {{ .Values.secret.defaultMode }}
  {{- if .Values.image.imagePullSecrets }}
  imagePullSecrets:
  {{- range .Values.image.imagePullSecrets }}
    - name: {{ . }}
  {{- end }}
  {{- end }}
{{- end }}
